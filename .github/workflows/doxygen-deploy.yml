name: Generate and Deploy Doxygen Documentation

on:
  push:
    branches:
      - main
      - master
      - devel
      - dev
      - release/*
    paths:
      - 'include/**'
      - 'API.md'
      - '.github/workflows/doxygen-deploy.yml'
      - 'Doxyfile'
  pull_request:
    branches:
      - main
      - master
      - devel
      - dev
      - release/*
    paths:
      - 'include/**'
      - 'API.md'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build and Deploy Documentation
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clone Doxygen Awesome theme
        run: |
          git clone https://github.com/jothepro/doxygen-awesome-css.git doxygen-awesome-css

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz

      - name: Generate Doxygen documentation
        run: doxygen Doxyfile

      - name: Copy Doxygen Awesome CSS to docs
        run: |
          cp doxygen-awesome-css/doxygen-awesome.css docs/html/
          cp doxygen-awesome-css/doxygen-awesome-sidebar-only.css docs/html/
          cp doxygen-awesome-css/doxygen-awesome-sidebar-only-darkmode-toggle.css docs/html/ || true

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs/html'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
